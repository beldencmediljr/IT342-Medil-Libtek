# ===================================================================
# SERVER APPLICATION LOGISTICS SETUP
# ===================================================================
server.port=8080

# ===================================================================
# DATABASE CONFIGURATION PARAMETERS (MySQL Architecture Target)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/libtek?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# OBJECT RELATIONAL MAPPING (JPA / HIBERNATE FRAMEWORK PROPERTIES)
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Stabilize SQL syntax dialect mapping configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false